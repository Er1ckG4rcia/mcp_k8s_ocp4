apiVersion: v1
kind: Service
metadata:
  name: mcp-ocp-observer
  namespace: validacao-infra
  labels:
    app: mcp-ocp-observer
    app.kubernetes.io/name: mcp-ocp-observer
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: mcp-platform
    app.kubernetes.io/version: "1.0.0"
spec:
  # ClusterIP: internal-only; the Route handles external access
  type: ClusterIP
  selector:
    app: mcp-ocp-observer
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: http
